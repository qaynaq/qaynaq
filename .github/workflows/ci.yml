name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
          check-latest: true
          cache: false

      - name: Cache Go build + module cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-ci-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-ci-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev

      - name: Download dependencies
        run: go mod download

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Build UI
        run: make ui-build

      - name: Run UI tests
        run: make ui-test

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=10m

      - name: Run tests
        run: go test -v ./...

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/qaynaq
          tags: |
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=sha

      - name: Compute build metadata
        id: buildmeta
        run: |
          echo "build_date=$(git -C "${GITHUB_WORKSPACE}" log -1 --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$(git -C "${GITHUB_WORKSPACE}" rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and cache Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: .container/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          cache-from: type=gha,scope=buildkit-qaynaq
          cache-to: type=gha,mode=max,scope=buildkit-qaynaq
          provenance: false
          sbom: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BUILD_DATE=${{ steps.buildmeta.outputs.build_date }}
            VERSION=${{ steps.buildmeta.outputs.version }}

      - name: Build summary
        run: |
          echo "### Docker Build Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${{ steps.docker_meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Cache has been populated for future builds! :white_check_mark:" >> $GITHUB_STEP_SUMMARY
