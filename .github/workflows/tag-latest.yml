name: Tag Latest

on:
  release:
    types: [published, edited]

jobs:
  tag-latest:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Check if latest release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          if [ "$LATEST" = "${{ github.event.release.tag_name }}" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.is_latest == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Buildx
        if: steps.check.outputs.is_latest == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Wait for Docker image to be available
        if: steps.check.outputs.is_latest == 'true'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/qaynaq"
          for i in $(seq 1 30); do
            if docker buildx imagetools inspect "${IMAGE}:${VERSION}" > /dev/null 2>&1; then
              echo "Image ${IMAGE}:${VERSION} is available"
              exit 0
            fi
            echo "Attempt ${i}/30 - image not available yet, waiting 30s..."
            sleep 30
          done
          echo "Image ${IMAGE}:${VERSION} not available after 15 minutes"
          exit 1

      - name: Tag Docker image as latest
        if: steps.check.outputs.is_latest == 'true'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/qaynaq"
          docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}:${VERSION}"
