version: 2
builds:
  - id: qaynaq
    main: ./cmd/qaynaq
    binary: qaynaq
    goos: [windows, darwin, linux]
    goarch: [amd64, arm64, arm]
    goarm: ["7"]
    ignore:
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm
    env:
      - CGO_ENABLED=0
    ldflags: >
      -s -w
      -X main.Version={{.Version}}
      -X main.DateBuilt={{.Date}}
archives:
  - id: qaynaq
    ids: [qaynaq]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
dist: target/dist
release:
  github:
    owner: qaynaq
    name: qaynaq
  prerelease: auto
  disable: false
