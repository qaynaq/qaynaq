id: shopify
name: Shopify
description: MCP tools for accessing your Shopify store data
version: 0.1.0
variables:
  - key: shop_name
    title: Store Name
    description: Your store name (without .myshopify.com)
    type: string
    required: true
    placeholder: mystore
  - key: api_access_token
    title: Admin API Access Token
    description: From Settings > Apps > Develop apps > your app > API credentials
    type: secret
    required: true
    placeholder: shpat_xxxxxxxxxxxxx
flows:
  - name: shopify_list_orders
    kind: tool
    description: List recent orders from your Shopify store
    input:
      component: mcp_tool
      config:
        name: shopify_list_orders
        description: List recent orders from your Shopify store
        input_schema:
          - { name: limit, type: string, required: false, description: "Max orders to return (default 50, max 250)" }
          - { name: status, type: string, required: false, description: "Filter: open, closed, cancelled, any" }
          - { name: since_id, type: string, required: false, description: Return orders after this ID for pagination }
    processors:
      - label: shopify
        component: shopify
        config:
          action: list_orders
          shop_name: "{{ shop_name }}"
          api_access_token: "{{ api_access_token }}"
          limit: ${!this.limit.or("50")}
          status: ${!this.status.or("")}
          since_id: ${!this.since_id.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: shopify_list_products
