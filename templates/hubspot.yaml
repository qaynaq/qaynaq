id: hubspot
name: HubSpot
description: MCP tools for reading contacts, companies, deals, and tickets from your HubSpot CRM
version: 0.1.0
variables:
  - key: oauth_connection
    title: OAuth Connection
    description: HubSpot OAuth connection. Set up in Connections page first.
    type: connection
    required: true
flows:
  - name: hubspot_list_contacts
    kind: tool
    description: List contacts from your HubSpot CRM
    input:
      component: mcp_tool
      config:
        name: hubspot_list_contacts
        description: List contacts from your HubSpot CRM
        input_schema:
          - { name: limit, type: string, required: false, description: "Max contacts to return (default 10, max 100)" }
          - { name: after, type: string, required: false, description: Pagination cursor from a previous response }
        annotations:
          read_only_hint: true
          destructive_hint: false
          idempotent_hint: true
          open_world_hint: true
    processors:
      - label: hubspot
        component: hubspot
        config:
          action: list_contacts
          oauth_connection: "{{ oauth_connection }}"
          limit: ${!this.limit.or("10")}
          after: ${!this.after.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: hubspot_get_contact
    kind: tool
    description: Get a specific contact by ID from your HubSpot CRM
    input:
      component: mcp_tool
      config:
        name: hubspot_get_contact
        description: Get a specific contact by ID from your HubSpot CRM
        input_schema:
          - { name: contact_id, type: string, required: true, description: The HubSpot contact ID }
        annotations:
          read_only_hint: true
          destructive_hint: false
          idempotent_hint: true
          open_world_hint: true
    processors:
      - label: hubspot
        component: hubspot
        config:
          action: get_contact
          oauth_connection: "{{ oauth_connection }}"
          object_id: ${!this.contact_id}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: hubspot_search_contacts
    kind: tool
    description: Search contacts in your HubSpot CRM by free text or property filters
    input:
      component: mcp_tool
      config:
        name: hubspot_search_contacts
        description: Search contacts in your HubSpot CRM by free text or property filters
        input_schema:
          - { name: query, type: string, required: false, description: Free-text search across default contact properties (e.g. name, email) }
          - { name: filters, type: string, required: false, description: "JSON filter groups for precise matching, e.g. [{\"filters\":[{\"propertyName\":\"email\",\"operator\":\"EQ\",\"value\":\"x@y.com\"}]}]" }
          - { name: limit, type: string, required: false, description: "Max contacts to return (default 10, max 200)" }
          - { name: after, type: string, required: false, description: Pagination cursor from a previous response }
        annotations:
          read_only_hint: true
          destructive_hint: false
          idempotent_hint: true
          open_world_hint: true
    processors:
      - label: hubspot
        component: hubspot
        config:
          action: search_contacts
          oauth_connection: "{{ oauth_connection }}"
          query: ${!this.query.or("")}
          filters: ${!this.filters.or("")}
          limit: ${!this.limit.or("10")}
          after: ${!this.after.or("")}
      - label: error_handler
