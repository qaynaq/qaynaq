  - name: google_drive_list_files
    kind: tool
    description: Retrieve a list of files from Google Drive based on query parameters.
    input:
      component: mcp_tool
      config:
        name: google_drive_list_files
        description: Retrieve a list of files from Google Drive based on query parameters.
        input_schema:
          - { name: query, type: string, required: false, description: Search query using Drive query syntax (e.g. name contains 'report') }
          - { name: folder_id, type: string, required: false, description: List files in a specific folder. Defaults to the configured folder if not provided. }
          - { name: max_results, type: number, required: false, description: Maximum number of files to return }
    processors:
      - label: google_drive
        component: google_drive
        config:
