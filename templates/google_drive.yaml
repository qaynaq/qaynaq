      config:
        name: google_drive_replace_file
        description: Upload new content to replace an existing file in Google Drive.
        input_schema:
          - { name: file_id, type: string, required: true, description: The ID of the file to replace }
          - { name: file_url, type: string, required: false, description: URL to download the replacement file from }
          - { name: content, type: string, required: false, description: Replacement content (text or base64 encoded) }
    processors:
