      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_create_shared_drive
    kind: tool
    description: Create a new shared drive (also known as Team Drive) in Google Drive.
    input:
      component: mcp_tool
      config:
        name: google_drive_create_shared_drive
        description: Create a new shared drive (also known as Team Drive) in Google Drive.
        input_schema:
          - { name: shared_drive_name, type: string, required: true, description: Name for the new shared drive }
    processors:
      - label: google_drive
        component: google_drive
        config:
