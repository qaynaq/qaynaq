      component: mcp_tool
      config:
        name: google_drive_create_folder
        description: Create a new, empty folder in Google Drive.
        input_schema:
          - { name: file_name, type: string, required: true, description: Name for the new folder }
          - { name: folder_id, type: string, required: false, description: Parent folder ID. Defaults to the configured folder if not provided. }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: create_folder
          oauth_connection: "{{ oauth_connection }}"
          file_name: ${!this.file_name}
          folder_id: ${!this.folder_id.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_move_file
    kind: tool
    description: Move a file from one folder to another in Google Drive.
    input:
      component: mcp_tool
      config:
        name: google_drive_move_file
        description: Move a file from one folder to another in Google Drive.
        input_schema:
          - { name: file_id, type: string, required: true, description: The ID of the file to move }
          - { name: destination_folder_id, type: string, required: true, description: The ID of the destination folder }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: move_file
          oauth_connection: "{{ oauth_connection }}"
          file_id: ${!this.file_id}
          destination_folder_id: ${!this.destination_folder_id}
      - label: error_handler
