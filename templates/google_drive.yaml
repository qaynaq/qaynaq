      component: mcp_tool
      config:
        name: google_drive_create_shortcut
        description: Create a shortcut to a file in Google Drive.
        input_schema:
          - { name: target_file_id, type: string, required: true, description: The ID of the file to create a shortcut to }
          - { name: file_name, type: string, required: false, description: Name for the shortcut }
          - { name: folder_id, type: string, required: false, description: Folder to create the shortcut in. Defaults to the configured folder if not provided. }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: create_shortcut
          oauth_connection: "{{ oauth_connection }}"
          target_file_id: ${!this.target_file_id}
          file_name: ${!this.file_name.or("")}
          folder_id: ${!this.folder_id.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_update_metadata
    kind: tool
    description: Update file or folder metadata including name, description, starred status, folder color, and custom properties.
    input:
      component: mcp_tool
      config:
        name: google_drive_update_metadata
        description: Update file or folder metadata including name, description, starred status, folder color, and custom properties.
        input_schema:
          - { name: file_id, type: string, required: true, description: The ID of the file or folder to update }
          - { name: file_name, type: string, required: false, description: New name for the file or folder }
          - { name: description, type: string, required: false, description: New description }
          - { name: starred, type: string, required: false, description: Whether the file is starred (true/false) }
          - { name: folder_color, type: string, required: false, description: "Folder color as hex (e.g. #FF0000)" }
          - { name: custom_properties, type: string, required: false, description: "JSON object of custom properties (e.g. {\"key\":\"value\"})" }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: update_metadata
          oauth_connection: "{{ oauth_connection }}"
          file_id: ${!this.file_id}
          file_name: ${!this.file_name.or("")}
          description: ${!this.description.or("")}
          starred: ${!this.starred.or("false")}
          folder_color: ${!this.folder_color.or("")}
          custom_properties: ${!this.custom_properties.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_rename
    kind: tool
    description: Update the name of a file or folder in Google Drive.
    input:
      component: mcp_tool
      config:
        name: google_drive_rename
        description: Update the name of a file or folder in Google Drive.
        input_schema:
          - { name: file_id, type: string, required: true, description: The ID of the file or folder to rename }
          - { name: file_name, type: string, required: true, description: The new name }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: rename
          oauth_connection: "{{ oauth_connection }}"
