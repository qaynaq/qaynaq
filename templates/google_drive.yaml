      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_find_folder
    kind: tool
    description: Search for a specific folder by name in Google Drive.
    input:
      component: mcp_tool
      config:
        name: google_drive_find_folder
        description: Search for a specific folder by name in Google Drive.
        input_schema:
          - { name: file_name, type: string, required: true, description: The folder name to search for }
          - { name: folder_id, type: string, required: false, description: Search within a specific parent folder. Defaults to the configured folder if not provided. }
          - { name: max_results, type: number, required: false, description: Maximum number of results }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: find_folder
          oauth_connection: "{{ oauth_connection }}"
          file_name: ${!this.file_name}
          folder_id: ${!this.folder_id.or("")}
          max_results: ${!this.max_results.or("100")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_find_or_create_file
    kind: tool
    description: Find an existing file by name, or create a new one if not found.
    input:
      component: mcp_tool
      config:
        name: google_drive_find_or_create_file
        description: Find an existing file by name, or create a new one if not found.
        input_schema:
          - { name: file_name, type: string, required: true, description: The file name to search for or create }
          - { name: folder_id, type: string, required: false, description: Folder to search in and create within. Defaults to the configured folder if not provided. }
          - { name: content, type: string, required: false, description: Text content if creating a new file }
          - { name: mime_type, type: string, required: false, description: MIME type if creating a new file }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: find_or_create_file
          oauth_connection: "{{ oauth_connection }}"
          file_name: ${!this.file_name}
          folder_id: ${!this.folder_id.or("")}
          content: ${!this.content.or("")}
          mime_type: ${!this.mime_type.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

