id: google_drive
name: Google Drive
description: 22 MCP tools for managing Google Drive files, folders, permissions, and shared drives.
version: 0.1.0
variables:
  - key: oauth_connection
    title: OAuth Connection
    description: Google OAuth connection. Set up in Connections page first.
    type: connection
    required: true
flows:
  - name: google_drive_copy_file
    kind: tool
    description: Create a copy of the specified file in Google Drive.
    input:
      component: mcp_tool
      config:
        name: google_drive_copy_file
        description: Create a copy of the specified file in Google Drive.
        input_schema:
          - { name: file_id, type: string, required: true, description: The ID of the file to copy }
          - { name: file_name, type: string, required: false, description: Name for the copy. Defaults to 'Copy of <original name>' if not provided. }
          - { name: folder_id, type: string, required: false, description: Destination folder ID. Defaults to the configured folder if not provided. }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: copy_file
          oauth_connection: "{{ oauth_connection }}"
          file_id: ${!this.file_id}
          file_name: ${!this.file_name.or("")}
          folder_id: ${!this.folder_id.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_delete_file_permanent
    kind: tool
    description: Permanently delete a file from Google Drive. This action cannot be undone.
    input:
      component: mcp_tool
      config:
        name: google_drive_delete_file_permanent
        description: Permanently delete a file from Google Drive. This action cannot be undone.
        input_schema:
          - { name: file_id, type: string, required: true, description: The ID of the file to permanently delete }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: delete_file_permanent
          oauth_connection: "{{ oauth_connection }}"
          file_id: ${!this.file_id}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_export_file
    kind: tool
    description: Export Google Workspace files (Docs, Sheets, Slides) to different formats like PDF, Word, Excel, etc.
    input:
      component: mcp_tool
      config:
        name: google_drive_export_file
        description: Export Google Workspace files (Docs, Sheets, Slides) to different formats like PDF, Word, Excel, etc.
        input_schema:
          - { name: file_id, type: string, required: true, description: The ID of the Google Workspace file to export }
          - { name: mime_type, type: string, required: true, description: "Target format MIME type (e.g. application/pdf, text/csv, application/vnd.openxmlformats-officedocument.wordprocessingml.document)" }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: export_file
          oauth_connection: "{{ oauth_connection }}"
          file_id: ${!this.file_id}
          mime_type: ${!this.mime_type}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_upload_file
    kind: tool
    description: Upload a file to Google Drive from a URL or content.
    input:
      component: mcp_tool
      config:
        name: google_drive_upload_file
        description: Upload a file to Google Drive from a URL or content.
        input_schema:
          - { name: file_name, type: string, required: true, description: Name for the uploaded file }
          - { name: file_url, type: string, required: false, description: URL to download the file from }
          - { name: content, type: string, required: false, description: File content (text or base64 encoded) }
          - { name: folder_id, type: string, required: false, description: Destination folder ID. Defaults to the configured folder if not provided. }
          - { name: mime_type, type: string, required: false, description: MIME type of the file }
          - { name: description, type: string, required: false, description: File description }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: upload_file
          oauth_connection: "{{ oauth_connection }}"
          file_name: ${!this.file_name}
          file_url: ${!this.file_url.or("")}
          content: ${!this.content.or("")}
          folder_id: ${!this.folder_id.or("")}
          mime_type: ${!this.mime_type.or("")}
          description: ${!this.description.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_create_folder
    kind: tool
    description: Create a new, empty folder in Google Drive.
