  - name: google_drive_add_file_sharing
    kind: tool
    description: Add a sharing permission to a file in Google Drive. Provides a sharing URL.
    input:
      component: mcp_tool
      config:
        name: google_drive_add_file_sharing
        description: Add a sharing permission to a file in Google Drive. Provides a sharing URL.
        input_schema:
          - { name: file_id, type: string, required: true, description: The ID of the file to share }
          - { name: email, type: string, required: false, description: Email address to share with (for user/group type) }
          - { name: role, type: string, required: false, description: "Permission role: reader, writer, commenter, owner" }
          - { name: permission_type, type: string, required: false, description: "Permission type: user, group, domain, anyone" }
          - { name: send_notification, type: string, required: false, description: Send notification email (true/false) }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: add_file_sharing
          oauth_connection: "{{ oauth_connection }}"
          file_id: ${!this.file_id}
          email: ${!this.email.or("")}
          role: ${!this.role.or("reader")}
          permission_type: ${!this.permission_type.or("user")}
          send_notification: ${!this.send_notification.or("true")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_create_shortcut
