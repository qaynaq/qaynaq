              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_create_file_from_text
    kind: tool
    description: Create a new file from plain text content in Google Drive.
    input:
      component: mcp_tool
      config:
        name: google_drive_create_file_from_text
        description: Create a new file from plain text content in Google Drive.
        input_schema:
          - { name: file_name, type: string, required: true, description: Name for the new file }
          - { name: content, type: string, required: true, description: Text content for the file }
          - { name: folder_id, type: string, required: false, description: Parent folder ID. Defaults to the configured folder if not provided. }
          - { name: mime_type, type: string, required: false, description: MIME type (defaults to text/plain) }
          - { name: description, type: string, required: false, description: File description }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: create_file_from_text
          oauth_connection: "{{ oauth_connection }}"
          file_name: ${!this.file_name}
          content: ${!this.content}
          folder_id: ${!this.folder_id.or("")}
          mime_type: ${!this.mime_type.or("text/plain")}
          description: ${!this.description.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_remove_file_permission
    kind: tool
    description: Remove specific user access to a file in Google Drive. Requires either email address or permission ID.
    input:
      component: mcp_tool
      config:
        name: google_drive_remove_file_permission
        description: Remove specific user access to a file in Google Drive. Requires either email address or permission ID.
        input_schema:
          - { name: file_id, type: string, required: true, description: The ID of the file }
          - { name: email, type: string, required: false, description: Email address of the user to remove }
          - { name: permission_id, type: string, required: false, description: Permission ID to remove (alternative to email) }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: remove_file_permission
          oauth_connection: "{{ oauth_connection }}"
          file_id: ${!this.file_id}
          email: ${!this.email.or("")}
          permission_id: ${!this.permission_id.or("")}
      - label: error_handler
        component: catch
        config:
          - mapping: |-
              meta status_code = error().re_find_all("^\\[[0-9]+\\]").index(0).trim("[]").or("500")
              root.error = error().re_replace_all("^\\[[0-9]+\\] ", "")
    output:
      component: sync_response

  - name: google_drive_replace_file
    kind: tool
    description: Upload new content to replace an existing file in Google Drive.
    input:
