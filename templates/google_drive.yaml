      component: sync_response

  - name: google_drive_find_file
    kind: tool
    description: Search for a specific file by name in Google Drive.
    input:
      component: mcp_tool
      config:
        name: google_drive_find_file
        description: Search for a specific file by name in Google Drive.
        input_schema:
          - { name: file_name, type: string, required: true, description: The file name to search for }
          - { name: folder_id, type: string, required: false, description: Search within a specific folder. Defaults to the configured folder if not provided. }
          - { name: max_results, type: number, required: false, description: Maximum number of results }
    processors:
      - label: google_drive
        component: google_drive
        config:
          action: find_file
          oauth_connection: "{{ oauth_connection }}"
          file_name: ${!this.file_name}
          folder_id: ${!this.folder_id.or("")}
