# Qaynaq Configuration
# Copy this file to config.yaml and adjust settings as needed.
# Precedence (highest wins): CLI flags > environment variables > this file > defaults.
#
# Values support environment variable interpolation:
#   ${VAR}            - replaced with the value of VAR (empty string if unset)
#   ${VAR:-default}   - replaced with VAR's value, or "default" if unset

# Node role (required). Uncomment one.
# role: coordinator
# role: worker

grpc-port: 50000
http-port: 8080
debug: false

database:
  driver: sqlite
  uri: "file:qaynaq.sqlite?_foreign_keys=1&mode=rwc"

  # PostgreSQL example with interpolation:
  # driver: postgres
  # uri: "postgres://${PG_USER:-qaynaq}:${PG_PASS}@${PG_HOST:-localhost}:${PG_PORT:-5432}/${PG_DB:-qaynaq}?sslmode=disable"

secret:
  # Must be exactly 32 bytes. Generate with:
  #   openssl rand -base64 32 | cut -c1-32
  key: "${SECRET_KEY:-CHANGE_ME_TO_A_RANDOM_32_BYTE_KEY}"

auth:
  type: none  # or: basic, oauth2

  # basic-username: qaynaq
  # basic-password: "${BASIC_AUTH_PASSWORD}"

  # oauth2-client-id: ""
  # oauth2-client-secret: ""
  # oauth2-authorization-url: ""
  # oauth2-token-url: ""
  # oauth2-redirect-url: ""
  # oauth2-scopes: "openid,email,profile"
  # oauth2-user-info-url: ""
  # oauth2-allowed-users: ""
  # oauth2-allowed-domains: ""
  # oauth2-session-cookie-name: qaynaq_session

# ====================
# Worker Configuration
# ====================

# Used by workers only. Points to the coordinator's gRPC endpoint.
discovery-uri: localhost:50000
